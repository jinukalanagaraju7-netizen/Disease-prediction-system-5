<!DOCTYPE html>
<html>
<head>

<title>Disease Prediction</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(45deg,#ff6a00,#ee0979,#00c6ff,#0072ff);
background-size:400% 400%;
animation:bg 8s infinite;
color:white;
padding:30px;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.box{
background:white;
color:black;
padding:25px;
border-radius:15px;
display:inline-block;
width:320px;
}

.symptoms{
text-align:left;
height:300px;
overflow-y:auto;
}

button{
padding:10px 20px;
margin-top:15px;
border:none;
border-radius:6px;
background:#0072ff;
color:white;
cursor:pointer;
}

#result{
margin-top:25px;
font-size:22px;
font-weight:bold;
background:white;
color:black;
padding:15px;
border-radius:10px;
display:inline-block;
}

.logout{
background:red;
margin-top:10px;
}

</style>

<script>

function predictDisease(){

var selected=[];
var boxes=document.querySelectorAll("input[name='symptom']:checked");

boxes.forEach(function(box){
selected.push(box.value);
});

var disease="No disease detected";

if(selected.includes("fever") && selected.includes("cough"))
disease="Flu";

else if(selected.includes("fever") && selected.includes("vomiting"))
disease="Food Poisoning";

else if(selected.includes("headache") && selected.includes("blurvision"))
disease="Migraine";

else if(selected.includes("fatigue") && selected.includes("weightloss"))
disease="Diabetes";

else if(selected.includes("shortbreath") && selected.includes("chestpain"))
disease="Heart Problem";

else if(selected.includes("itching") && selected.includes("rash"))
disease="Skin Allergy";

else if(selected.includes("cold") && selected.includes("sorethroat"))
disease="Common Cold";

else if(selected.includes("dizziness") && selected.includes("fatigue"))
disease="Low Blood Pressure";

else if(selected.includes("diarrhea") && selected.includes("stomach"))
disease="Stomach Infection";

else if(selected.includes("backpain") && selected.includes("legpain"))
disease="Muscle Pain";

document.getElementById("result").innerHTML="🩺 Possible Disease: "+disease;

}

function logout(){
window.location="index.html";
}

</script>

</head>

<body>

<h1>🩺 Disease Prediction System</h1>

<div class="box">

<div class="symptoms">

<label><input type="checkbox" name="symptom" value="fever" onchange="predictDisease()"> Fever</label>
<label><input type="checkbox" name="symptom" value="cough" onchange="predictDisease()"> Cough</label>
<label><input type="checkbox" name="symptom" value="headache" onchange="predictDisease()"> Headache</label>
<label><input type="checkbox" name="symptom" value="stomach" onchange="predictDisease()"> Stomach Pain</label>
<label><input type="checkbox" name="symptom" value="cold" onchange="predictDisease()"> Cold</label>
<label><input type="checkbox" name="symptom" value="vomiting" onchange="predictDisease()"> Vomiting</label>
<label><input type="checkbox" name="symptom" value="fatigue" onchange="predictDisease()"> Fatigue</label>
<label><input type="checkbox" name="symptom" value="sorethroat" onchange="predictDisease()"> Sore Throat</label>
<label><input type="checkbox" name="symptom" value="chestpain" onchange="predictDisease()"> Chest Pain</label>
<label><input type="checkbox" name="symptom" value="dizziness" onchange="predictDisease()"> Dizziness</label>

<label><input type="checkbox" name="symptom" value="diarrhea" onchange="predictDisease()"> Diarrhea</label>
<label><input type="checkbox" name="symptom" value="constipation" onchange="predictDisease()"> Constipation</label>
<label><input type="checkbox" name="symptom" value="backpain" onchange="predictDisease()"> Back Pain</label>
<label><input type="checkbox" name="symptom" value="jointpain" onchange="predictDisease()"> Joint Pain</label>
<label><input type="checkbox" name="symptom" value="toothache" onchange="predictDisease()"> Tooth Ache</label>
<label><input type="checkbox" name="symptom" value="earpain" onchange="predictDisease()"> Ear Pain</label>
<label><input type="checkbox" name="symptom" value="rash" onchange="predictDisease()"> Skin Rash</label>
<label><input type="checkbox" name="symptom" value="itching" onchange="predictDisease()"> Itching</label>
<label><input type="checkbox" name="symptom" value="weightloss" onchange="predictDisease()"> Weight Loss</label>
<label><input type="checkbox" name="symptom" value="blurvision" onchange="predictDisease()"> Blur Vision</label>

<label><input type="checkbox" name="symptom" value="shortbreath" onchange="predictDisease()"> Short Breath</label>
<label><input type="checkbox" name="symptom" value="sweating" onchange="predictDisease()"> Sweating</label>
<label><input type="checkbox" name="symptom" value="nausea" onchange="predictDisease()"> Nausea</label>
<label><input type="checkbox" name="symptom" value="legpain" onchange="predictDisease()"> Leg Pain</label>
<label><input type="checkbox" name="symptom" value="neckpain" onchange="predictDisease()"> Neck Pain</label>
<label><input type="checkbox" name="symptom" value="anxiety" onchange="predictDisease()"> Anxiety</label>
<label><input type="checkbox" name="symptom" value="depression" onchange="predictDisease()"> Depression</label>
<label><input type="checkbox" name="symptom" value="sleep" onchange="predictDisease()"> Sleep Problem</label>
<label><input type="checkbox" name="symptom" value="hairfall" onchange="predictDisease()"> Hair Fall</label>
<label><input type="checkbox" name="symptom" value="dryskin" onchange="predictDisease()"> Dry Skin</label>

</div>

<button onclick="predictDisease()">Predict Disease</button>

<br>

<button class="logout" onclick="logout()">Logout</button>

</div>

<br><br>

<div id="result">Result will appear here</div>

</body>
</html>
