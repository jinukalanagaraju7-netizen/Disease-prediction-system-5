<!DOCTYPE html>
<html>
<head>
<title>Disease Prediction System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="doors" id="doors">
<div class="door left"></div>
<div class="door right"></div>
</div>

<div class="login-box">

<h1>🩺 Disease Prediction System</h1>

<input type="text" id="username" placeholder="Enter Username">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p>New User?</p>

<button onclick="showRegister()">Create Account</button>

<p id="error"></p>

</div>

<div class="register-box" id="register">

<h2>Create Account</h2>

<input type="text" id="newuser" placeholder="Create Username">
<input type="password" id="newpass" placeholder="Create Password">

<button onclick="register()">Register</button>

</div>

<script src="script.js"></script>

</body>
</html>
